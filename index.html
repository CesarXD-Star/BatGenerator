<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Start Scripts - Minecraft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #2a2a32;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .banner {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 20px;
            background-color: #3a3a45; /* Fondo temporal por si no carga la imagen */
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #bbb;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #3a3a45;
            color: #fff;
            box-sizing: border-box;
            font-size: 15px;
        }
        input[type="text"]:focus, select:focus {
            outline: none;
            border-color: #4caf50;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 1. Imagen de arriba (Sube tu imagen a GitHub con el nombre logo.png) -->
    <img src="logo.png" alt="Minecraft Server Generator" class="banner" onerror="this.style.display='none';">

    <!-- Formulario Centro -->
    <!-- Campo 1: Nombre del JAR -->
    <div class="form-group">
        <label for="jarName">1. Nombre del archivo .jar:</label>
        <input type="text" id="jarName" value="server.jar" placeholder="ej. server.jar o mohist.jar">
    </div>

    <!-- Campo 2: Memoria RAM -->
    <div class="form-group">
        <label for="ram">2. Cantidad de Memoria RAM:</label>
        <select id="ram">
            <option value="512M">512 MB</option>
            <option value="1G" selected>1 GB</option>
            <option value="2G">2 GB</option>
            <option value="4G">4 GB</option>
            <option value="6G">6 GB</option>
            <option value="8G">8 GB</option>
            <option value="10G">10 GB</option>
            <option value="12G">12 GB</option>
            <option value="14G">14 GB</option>
            <option value="16G">16 GB</option>
            <option value="18G">18 GB</option>
            <option value="20G">20 GB</option>
            <option value="22G">22 GB</option>
            <option value="24G">24 GB</option>
            <option value="26G">26 GB</option>
            <option value="28G">28 GB</option>
            <option value="30G">30 GB</option>
            <option value="32G">32 GB</option>
        </select>
    </div>

    <!-- Campo 3: Sistema Operativo -->
    <div class="form-group">
        <label for="os">3. Sistema Operativo:</label>
        <select id="os">
            <option value="windows">Windows</option>
            <option value="windows_server">Windows Server</option>
            <option value="linux">Linux</option>
            <option value="ubuntu">Ubuntu</option>
            <option value="macos">MacOS</option>
        </select>
    </div>

    <!-- Condicional: ¿Limitar Almacenamiento? -->
    <div class="form-group checkbox-group">
        <input type="checkbox" id="limitStorage" onchange="toggleStorage()">
        <label for="limitStorage">¿Limitar Almacenamiento en disco?</label>
    </div>

    <!-- Campo 4: Almacenamiento (Oculto por defecto) -->
    <div class="form-group hidden" id="storageGroup">
        <label for="storage">4. Límite de Almacenamiento:</label>
        <select id="storage">
            <option value="2G">2 GB</option>
            <option value="4G">4 GB</option>
            <option value="8G">8 GB</option>
            <option value="16G">16 GB</option>
            <option value="32G">32 GB</option>
            <option value="64G">64 GB</option>
            <option value="128G">128 GB</option>
            <option value="256G">256 GB</option>
            <option value="512G">512 GB</option>
            <option value="1T">1 TB</option>
        </select>
    </div>

    <!-- Botón Abajo -->
    <button onclick="generateScript()">Generar y Descargar Script</button>
</div>

<script>
    // Muestra u oculta la opción de almacenamiento según el checkbox
    function toggleStorage() {
        const checkbox = document.getElementById('limitStorage');
        const storageGroup = document.getElementById('storageGroup');
        if (checkbox.checked) {
            storageGroup.classList.remove('hidden');
        } else {
            storageGroup.classList.add('hidden');
        }
    }

    function generateScript() {
        let jar = document.getElementById('jarName').value.trim();
        const ram = document.getElementById('ram').value;
        const os = document.getElementById('os').value;
        const limitStorage = document.getElementById('limitStorage').checked;
        const storage = document.getElementById('storage').value;

        // Asegurar que el jar termine en .jar
        if (!jar.endsWith('.jar')) {
            jar += '.jar';
        }

        let scriptContent = "";
        let fileName = "start.bat";

        // Lógica según Sistema Operativo
        if (os === "windows" || os === "windows_server") {
            fileName = "start.bat";
            scriptContent += "@echo off\n";
            if (limitStorage) {
                scriptContent += `rem Almacenamiento sugerido limitado a: ${storage}\n`;
            }
            scriptContent += `java -Xmx${ram} -Xms${ram} -jar ${jar} nogui\n`;
            scriptContent += "pause\n";
        } else {
            // Linux, Ubuntu, MacOS usan scripts .sh
            fileName = "start.sh";
            scriptContent += "#!/bin/bash\n";
            if (limitStorage) {
                scriptContent += `# Almacenamiento sugerido limitado a: ${storage}\n`;
            }
            scriptContent += `java -Xmx${ram} -Xms${ram} -jar ${jar} nogui\n`;
        }

        // Crear la descarga automática del archivo
        const blob = new Blob([scriptContent], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = fileName;
        link.click();
        URL.revokeObjectURL(link.href);
    }
</script>

</body>
</html>
